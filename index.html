<!DOCTYPE html>
<html lang="ru">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Мой блог</title>
          <link rel="stylesheet" href="css/style.css">
          <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
          <header>
                    <h1><a href="/">📝 Блог одного девоперса</a></h1>
                    <p>Заметки об IT и жизни</p>
          </header>

          <main>
                    <!-- Блок поиска и фильтров -->
                    <div class="search-section">
                              <div class="search-container">
                                        <input type="text" id="search-input"
                                                  placeholder="🔍 Поиск по заголовкам, описанию или тегам..."
                                                  autocomplete="off">
                                        <button id="clear-search" class="clear-search" style="display: none;">✕</button>
                              </div>

                              <div class="tags-container" id="tags-container">
                                        <div class="tag active" data-tag="all">📌 Все статьи</div>
                              </div>

                              <div id="search-stats" class="search-stats"></div>
                    </div>

                    <div id="posts-list"></div>
          </main>

          <footer>
                    <p>&copy; 2026 Мой блог</p>
          </footer>

          <script src="config.js"></script>
          <script src="js/main.js"></script>
</body>

</html>
